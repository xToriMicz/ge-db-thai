name: KGE News Monitor

on:
  schedule:
    # ทุกวัน 02:00 UTC = 09:00 เวลาไทย
    - cron: '0 2 * * *'
  workflow_dispatch: # รัน manual ได้

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run KGE News Monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node .github/scripts/kge-monitor.mjs

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/scripts/monitor-state.json
          git diff --staged --quiet || git commit -m "chore: update monitor state" && git push
