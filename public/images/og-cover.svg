<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e2e"/>
      <stop offset="50%" style="stop-color:#12162a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#gold)" opacity="0.7"/>

  <!-- Diamond ornament -->
  <polygon points="600,140 616,160 600,180 584,160" stroke="#f0c040" stroke-width="1" fill="#f0c04010" opacity="0.5"/>

  <!-- Main text -->
  <text x="600" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="700" fill="#f0c040" text-anchor="middle" filter="url(#glow)">GE</text>
  <text x="600" y="320" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="400" fill="#e6edf3" text-anchor="middle">Database</text>
  <text x="600" y="375" font-family="Noto Sans Thai, Arial, sans-serif" font-size="40" font-weight="600" fill="#3fb950" text-anchor="middle">Thai</text>

  <!-- Decorative line -->
  <line x1="380" y1="410" x2="820" y2="410" stroke="#f0c040" stroke-width="1" opacity="0.25"/>
  <polygon points="600,403 607,410 600,417 593,410" fill="#f0c040" opacity="0.3"/>

  <text x="600" y="460" font-family="Noto Sans Thai, Arial, sans-serif" font-size="26" fill="#8b949e" text-anchor="middle">ฐานข้อมูล Granado Espada ภาษาไทย</text>
  <text x="600" y="510" font-family="Inter, Arial, sans-serif" font-size="20" fill="#6e7681" text-anchor="middle">292 Characters · 4,700 Skills · 10,490+ Items · 630 Monsters · Thai Names</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#gold)" opacity="0.5"/>
</svg>
