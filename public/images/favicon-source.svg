<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Source SVG for generating PNG favicons at various sizes -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1e2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d060"/>
      <stop offset="100%" style="stop-color:#d4a020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="512" height="32" rx="16" fill="url(#gold)" opacity="0.7"/>

  <!-- GE Letters -->
  <text x="130" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="260" font-weight="700" fill="url(#gold)" letter-spacing="-15" filter="url(#glow)">GE</text>

  <!-- Bottom decorative line -->
  <line x1="80" y1="400" x2="432" y2="400" stroke="#f0c040" stroke-width="3" opacity="0.3"/>

  <!-- Diamond ornament -->
  <polygon points="256,390 272,410 256,430 240,410" fill="#f0c040" opacity="0.4"/>

  <!-- Crossed rapier accents (subtle) -->
  <line x1="160" y1="420" x2="256" y2="390" stroke="#f0c040" stroke-width="1.5" opacity="0.2"/>
  <line x1="352" y1="420" x2="256" y2="390" stroke="#f0c040" stroke-width="1.5" opacity="0.2"/>

  <!-- Bottom bar -->
  <rect x="0" y="480" width="512" height="32" rx="16" fill="url(#gold)" opacity="0.5"/>
</svg>
